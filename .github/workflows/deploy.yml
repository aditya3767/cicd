name: CI/CD Pipeline

# This tells GitHub WHEN to run the pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# These are the JOBS that run
jobs:
  # ============ JOB 1: CI (Testing & Building) ============
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Get your code from GitHub
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # Step 4: RUN TESTS (This is the CI part!)
    - name: Run tests
      run: |
        pytest test_app.py -v

    # Step 5: Build Docker image
    - name: Build Docker image
      run: |
        docker build -t my-app:${{ github.sha }} .
        docker tag my-app:${{ github.sha }} my-app:latest

    # Step 6: Save the image for deployment
    - name: Save Docker image
      run: |
        docker save my-app:latest > my-app.tar

    # Step 7: Upload to next job
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: my-app-image
        path: my-app.tar

  # ============ JOB 2: CD (Deployment) ============
  deploy:
    # Only run if CI passed
    needs: test-and-build

    # Only deploy on pushes to main (not pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
    # Step 1: Download the Docker image from CI job
    - name: Download Docker image
      uses: actions/download-artifact@v3
      with:
        name: my-app-image

    # Step 2: Load the image
    - name: Load Docker image
      run: |
        docker load < my-app.tar
        docker images

    # Step 3: Deploy to Render (Using Render API)
    - name: Deploy to Render
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        echo "🚀 Deploying to Render..."
        
        # This calls Render's API to trigger deployment
        curl -X POST \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"clearCache": false}' \
          https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys
        
        echo "✅ Deployment triggered!"

    # Step 4: Verify deployment
    - name: Wait for deployment
      run: |
        echo "⏳ Waiting for deployment to complete..."
        sleep 30
        
        # Get your Render URL
        RENDER_URL="https://my-cicd-app.onrender.com"
        
        echo "🌐 Testing: $RENDER_URL"
        curl -f $RENDER_URL/health || exit 1
        
        echo "✅ Deployment verified!"
        echo "🌍 Live at: $RENDER_URL"